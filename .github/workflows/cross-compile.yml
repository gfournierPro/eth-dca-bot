name: Cross-compile for Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  cross-compile:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android
    
    - name: Cache cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Install cross
      run: cargo install cross --git https://github.com/cross-rs/cross
    
    - name: Cross compile for Android
      env:
        CROSS_NO_WARNINGS: "0"
        OPENSSL_STATIC: "1"
        OPENSSL_VENDOR: "1"
        OPENSSL_NO_PKG_CONFIG: "1"
        PKG_CONFIG_ALLOW_CROSS: "0"
      run: cross build --target aarch64-linux-android --release
    
    - name: Upload Android binary
      uses: actions/upload-artifact@v4
      with:
        name: eth-dca-bot-android
        path: target/aarch64-linux-android/release/eth-dca-bot
        retention-days: 30
